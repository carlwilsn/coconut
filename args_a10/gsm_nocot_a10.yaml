# Single-A10 no-CoT baseline for GSM8K (direct question -> answer, no reasoning steps).
# Not shipped in the repo; derived from gsm_cot.yaml with the no_cot method flag.
# Launch: torchrun --nnodes 1 --nproc_per_node 1 run.py args_a10/gsm_nocot_a10.yaml

project: coconut
save_path: checkpoints/gsm-nocot
name: gsm-nocot

only_eval: False

coconut: False
cot: False
no_thoughts: False
no_cot: True

c_thought: 0
epochs_per_stage: 1
max_latent_stage: 0
pad_latent_to_max: True

save_only_improve: True
uniform_prob: 0.0
model_id: openai-community/gpt2
load_model_path: None
seed: 0
resume: 0
bf16: True
train_path: data/gsm_train.json
val_path: data/gsm_valid.json
reset_optimizer: False
batch_size_training: 16
debug: False
gradient_accumulation_steps: 8
num_epochs: 25
lr: !!float "1e-4"
weight_decay: 0.01
